name: 🏀 Hoopstreet State-Aware Sync

on:
  push:
    paths:
      - 'steps.md'
  workflow_dispatch:

jobs:
  hoopstreet-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Python Requests
        run: pip install requests

      - name: AI Logic Engine (OpenRouter)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python << 'EOF'
          import os, requests, json, datetime

          # 1. LOAD SYSTEM STATE
          def read_file(path):
              return open(path, 'r').read() if os.path.exists(path) else ""

          steps_content = read_file('steps.md')
          roadmap_content = read_file('ROADMAP.md')
          dna_content = read_file('DNA.md')
          logs_content = read_file('logs.txt')
          
          # 2. CONSTRUCT ARCHITECT PROMPT
          prompt = f"""
          You are the Hoopstreet Master Architect. 
          
          INSTRUCTIONS (steps.md):
          {steps_content}

          CURRENT STATE:
          - ROADMAP.md: {roadmap_content}
          - DNA.md: {dna_content}
          - logs.txt: {logs_content}

          TASK:
          1. Identify any "Phase" or "Feature" in steps.md that is NOT yet reflected in ROADMAP.md or DNA.md.
          2. If steps.md mentions a script/code that is missing from the repo, generate the full code.
          3. Generate the specific updates needed to synchronize these files.
          
          OUTPUT FORMAT (JSON ONLY):
          {{
            "new_files": {{"filename": "code_content"}},
            "update_roadmap": "Full new content for ROADMAP.md",
            "update_dna": "Full new content for DNA.md",
            "update_logs": "New lines to append to logs.txt"
          }}
          """

          # 3. CALL OPENROUTER
          headers = {
              "Authorization": f"Bearer {os.getenv('OPENROUTER_API_KEY')}",
              "Content-Type": "application/json"
          }
          payload = {
              "model": "google/gemini-2.0-pro-exp-02-05:free",
              "messages": [{"role": "user", "content": prompt}]
          }
          
          response = requests.post("https://openrouter.ai/api/v1/chat/completions", headers=headers, json=payload)
          raw_res = response.json()['choices'][0]['message']['content']
          
          # Clean JSON formatting
          clean_res = raw_res.replace('```json', '').replace('```', '').strip()
          data = json.loads(clean_res)

          # 4. APPLY CHANGES (Merging & Creating)
          # Create New Code/Scripts
          for filename, content in data.get('new_files', {}).items():
              with open(filename, 'w') as f:
                  f.write(content)
              print(f"✅ Created missing code: {filename}")

          # Overwrite Docs with Merged State
          with open('ROADMAP.md', 'w') as f:
              f.write(data['update_roadmap'])
          
          with open('DNA.md', 'w') as f:
              f.write(data['update_dna'])

          with open('logs.txt', 'a') as f:
              f.write(f"\n{data['update_logs']}")

          print("🚀 All files synchronized based on steps.md")
          EOF

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Hoopstreet AI Bot"
          git add .
          git commit -m "🤖 AI: Synchronized state from steps.md [skip ci]" || echo "No changes"
          git push
