name: 24/7 Hoopstreet Autonomous Agent
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  coordinate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Orchestrator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          pip install supabase requests
          python3 core/orchestrator.py
          
      - name: Auto-Commit Upgrades
        run: |
          git config --global user.name "Hoopstreet-AI-Agent"
          git config --global user.email "agent@hoopstreet.com"
          git add .
          git commit -m "🤖 [Auto-Adoption] Real-time DNA Upgrade $(date)" || echo "No changes"
          git push
