# .github/workflows/hoopstreet-autonomous.yml
name: 24/7 Auto-Healing Sync
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/30 * * * *' # Runs every 30 mins for 24/7 health checks

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: DNA Integrity Check & Merge
        env:
          GEMINI_POOL: ${{ secrets.GEMINI_POOL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python3 core/ai_sync.py --mode=autonomous
          git config --global user.name "Hoopstreet-AI-Bot"
          git config --global user.email "bot@hoopstreet.com"
          git add . && git commit -m "🤖 [Auto-Heal] DNA Synchronized" || echo "No changes"
          git push
