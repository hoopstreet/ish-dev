name: HOOPSTREET CI PIPELINE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Run system test
        run: |
          python3 -m compileall .

      - name: Run agent core
        run: |
          python3 agents/core.py
